pool:
  name: Azure Pipelines
  demands:
  - MSBuild
  - Xamarin.Android
  - vstest
  - JDK

variables:
  restorePkgSolution: '**\*.sln'
  binariesDirectory: '$(build.binariesdirectory)/$(BuildConfiguration)'

steps:
- task: NuGetToolInstaller@0
  displayName: 'Use NuGet 4.4.1'
  inputs:
    versionSpec: 4.4.1

- task: NuGetCommand@2
  displayName: 'NuGet restore'
  inputs:
    restoreSolution: '$(restorePkgSolution)'

- script: |
    echo "Current directory: $(pwd)"
    ls **/*.csproj
  displayName: 'Check for .csproj files'

- task: XamarinComponentInstaller@1
  displayName: 'Install Xamarin.Android'
  inputs:
    xamarinVersion: 'latest'

- task: XamarinAndroid@1
  displayName: 'Build Xamarin.Android project **/*Droid*.csproj'
  inputs:
    projectFile: '**/*Android*.csproj'
    outputDirectory: '$(binariesDirectory)'
    configuration: '$(BuildConfiguration)'
    msbuildVersionOption: latest
    msbuildArchitectureOption: x64

- task: MSBuild@1
  displayName: 'Unit tests'
  inputs:
    solution: TrainingManagerUnitTest/TrainingManagerUnitTest.csproj
    configuration: '$(BuildConfiguration)'
    msbuildArguments: '/p:OutputPath="$(binariesDirectory)/test-assembly"'

- task: VSTest@2
  displayName: 'VsTest - testAssemblies'
  inputs:
    testAssemblyVer2: |
     **\*test*.dll
     !**\*TestAdapter.dll
     !**\obj\**
    searchFolder: '$(binariesDirectory)/test-assembly'

- task: AndroidSigning@3
  displayName: 'Signing and aligning APK file(s)'
  inputs:
    apkFiles: '$(Parameters.appFiles)'
    apksignerKeystoreFile: '24ee6cce-2fca-4670-96ba-64f6d7d6feb1'
    apksignerKeystorePassword: '$(KeyStore.Password)'
    apksignerKeystoreAlias: '$(KeyStore.Alias)'
    apksignerKeyPassword: '$(KeyStore.Password)'

- task: PublishBuildArtifacts@1
  displayName: 'Publish Artifact: drop'
  inputs:
    PathtoPublish: '$(binariesDirectory)'
  condition: succeededOrFailed()